<!doctype html>
<html>
  <body>
    <h1>Stynger</h1>
    {% if current_user.is_authenticated %}
      <p>Logged in as {{ current_user.username }}</p>
      <a href="{{ url_for('logout') }}">Logout</a>
    {% else %}
      <a href="{{ url_for('login') }}">Login</a>
      <a href="{{ url_for('signup') }}">Sign Up</a>
    {% endif %}
  </body>
</html>
